services:
  - type: web
    name: shadow-garden-api
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@10.26.1 --activate
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/ping
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: PNPM_VERSION
        value: 10.26.1
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true

  - type: web
    name: shadow-garden-web
    runtime: static
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@10.26.1 --activate
      pnpm install --frozen-lockfile
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/shadow-garden run build
    staticPublishPath: artifacts/shadow-garden/dist/public
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
    routes:
      - type: rewrite
        source: /api/*
        destination: https://shadow-garden-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
